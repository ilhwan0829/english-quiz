const LEVEL_LABELS = {1:"3학년",2:"4학년",3:"5학년",4:"6학년",5:"심화"};
const LEVEL_COLORS = {1:"#22c55e",2:"#3b82f6",3:"#a855f7",4:"#f59e0b",5:"#ef4444"};

// ===== STATE =====
let state = {
  screen:"login", studentName:"", studentNumber:"",
  currentLevel:3, questionIndex:0, question:null,
  selected:null, spellingInput:"", showFeedback:false, isCorrect:false,
  results:[], streak:0, levelHistory:[],
  retryWords:[], retryIndex:0, retryRound:1,
  retryStillWrong:[], retryResults:[], submitStatus:"idle"
};

// ===== UTILS =====
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function getRandWords(lv,n,ex){let p=WORD_DATA[lv]||[];if(ex)p=p.filter(w=>w.en!==ex.en);return shuffle(p).slice(0,n)}
function findLv(w){for(let l=1;l<=5;l++)if(WORD_DATA[l].some(x=>x.en===w.en))return l;return 3}

function genQ(lv,fw){
  let pool=WORD_DATA[lv];if(!pool||!pool.length)return null;
  let t=fw||pool[Math.floor(Math.random()*pool.length)];
  let tp;
  if(fw){tp=Math.random()<.5?0:1}
  else if(lv<=2){tp=Math.random()<.5?0:1}
  else{let r=Math.random();tp=r<.4?0:r<.75?1:2}
  if(tp<=1){
    let d=getRandWords(lv,3,t);
    if(d.length<3){let adj=lv<5?lv+1:lv-1;d=[...d,...getRandWords(adj,3-d.length,t)]}
    let opts=shuffle([t,...d]);
    return{type:tp,word:t,options:opts,answer:tp===0?t.ko:t.en,level:lv}
  }
  return{type:2,word:t,answer:t.en.toLowerCase(),level:lv}
}

// ===== GOOGLE SHEETS =====
async function submitToSheets(){
  if(!APPS_SCRIPT_URL)return;
  let s=state;
  let uw=s.results.filter(r=>!r.correct).map(r=>r.word).filter((w,i,a)=>a.findIndex(x=>x.en===w.en)===i);
  let acc=s.results.length?Math.round(s.results.filter(r=>r.correct).length/s.results.length*100):0;
  let tc=s.results.filter(r=>r.correct).length;
  let ml=s.levelHistory.length?Math.max(...s.levelHistory):3;
  let gr=acc>=90?"S":acc>=75?"A":acc>=60?"B":acc>=40?"C":"D";
  let payload={
    name:s.studentName,number:s.studentNumber,accuracy:acc,
    totalCorrect:tc,totalQuestions:TOTAL_QUESTIONS,grade:gr,
    maxLevel:ml,finalLevel:s.currentLevel,
    retryRounds:uw.length>0?s.retryRound:0,
    wrongWords:uw.map(w=>({en:w.en,ko:w.ko})),
    levelHistory:s.levelHistory,
    details:s.results.map(r=>({word:r.word.en,meaning:r.word.ko,correct:r.correct,level:r.level,type:r.type}))
  };
  state.submitStatus="sending";render();
  try{
    let url=APPS_SCRIPT_URL+"?data="+encodeURIComponent(JSON.stringify(payload));
    await fetch(url,{mode:"no-cors"});
    state.submitStatus="success";
  }catch(e){
    console.error(e);
    state.submitStatus="error";
  }
  render();
}

// ===== ACTIONS =====
function startQuiz(){
  if(!state.studentName.trim()||!state.studentNumber.trim())return;
  Object.assign(state,{screen:"quiz",questionIndex:0,results:[],streak:0,currentLevel:3,
    levelHistory:[3],retryWords:[],retryIndex:0,retryRound:1,retryStillWrong:[],retryResults:[],
    submitStatus:"idle",selected:null,spellingInput:"",showFeedback:false});
  state.question=genQ(3);render();
}

function checkAnswer(){
  if(state.showFeedback)return;
  let q=state.question,correct;
  if(q.type===2)correct=state.spellingInput.trim().toLowerCase()===q.answer;
  else correct=state.selected===q.answer;
  state.isCorrect=correct;state.showFeedback=true;
  state.results.push({word:q.word,correct,level:q.level,type:q.type});
  let ns=correct?(state.streak>=0?state.streak+1:1):(state.streak<=0?state.streak-1:-1);
  let nl=state.currentLevel;
  if(ns>=3&&nl<5){nl++;ns=0}else if(ns<=-2&&nl>1){nl--;ns=0}
  state.streak=ns;state.currentLevel=nl;state.levelHistory.push(nl);
  render();
}

function nextQuestion(){
  let ni=state.questionIndex+1;
  if(ni>=TOTAL_QUESTIONS){
    let wrong=state.results.filter(r=>!r.correct).map(r=>r.word);
    let uniq=wrong.filter((w,i,a)=>a.findIndex(x=>x.en===w.en)===i);
    if(uniq.length>0){
      Object.assign(state,{retryWords:shuffle([...uniq]),retryIndex:0,retryRound:1,retryStillWrong:[],retryResults:[],screen:"retry_intro"});
    }else{state.screen="result";submitToSheets()}
    render();return;
  }
  Object.assign(state,{questionIndex:ni,selected:null,spellingInput:"",showFeedback:false});
  state.question=genQ(state.currentLevel);render();
}

function startRetry(){
  state.screen="retry";let w=state.retryWords[0];
  state.question=genQ(findLv(w),w);
  state.selected=null;state.spellingInput="";state.showFeedback=false;state.isCorrect=false;
  render();
}

function checkRetryAnswer(){
  if(state.showFeedback)return;
  let q=state.question,correct;
  if(q.type===2)correct=state.spellingInput.trim().toLowerCase()===q.answer;
  else correct=state.selected===q.answer;
  state.isCorrect=correct;state.showFeedback=true;
  state.retryResults.push({word:q.word,correct,round:state.retryRound});
  if(!correct&&!state.retryStillWrong.some(x=>x.en===q.word.en))state.retryStillWrong.push(q.word);
  render();
}

function nextRetryQuestion(){
  let ni=state.retryIndex+1;
  if(ni>=state.retryWords.length){
    if(state.retryStillWrong.length>0){
      state.retryWords=shuffle([...state.retryStillWrong]);
      state.retryIndex=0;state.retryRound++;state.retryStillWrong=[];
      state.screen="retry_intro";
    }else{state.screen="result";submitToSheets()}
    render();return;
  }
  state.retryIndex=ni;let w=state.retryWords[ni];
  state.question=genQ(findLv(w),w);
  state.selected=null;state.spellingInput="";state.showFeedback=false;state.isCorrect=false;
  render();
}

// ===== RENDER =====
function h(tag,attrs,...kids){
  let el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else if(k==="disabled")el.disabled=v;
    else if(k==="placeholder")el.placeholder=v;
    else if(k==="type")el.type=v;
    else if(k==="value")el.value=v;
    else if(k==="autoComplete")el.autocomplete=v;
    else el.setAttribute(k,v);
  });
  kids.flat().forEach(c=>{if(c!=null)el.append(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c)});
  return el;
}

function render(){
  let app=document.getElementById("app");
  app.innerHTML="";
  app.className=state.screen==="login"||state.screen==="retry_intro"?"center":"";
  
  if(state.screen==="login")renderLogin(app);
  else if(state.screen==="retry_intro")renderRetryIntro(app);
  else if(state.screen==="quiz"||state.screen==="retry")renderQuiz(app);
  else if(state.screen==="result")renderResult(app);
}

function renderLogin(app){
  let card=h("div",{className:"card card-sm"},
    h("div",{style:{textAlign:"center",marginBottom:"36px"}},
      h("div",{style:{fontSize:"48px",marginBottom:"12px"}},"📚"),
      h("h1",{style:{fontSize:"28px",fontWeight:800,background:"linear-gradient(135deg,#c084fc,#818cf8,#60a5fa)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},"영어 단어 퀴즈"),
      h("p",{className:"muted",style:{marginTop:"8px"}},"서울용동초등학교 5학년 2반")
    ),
    h("div",{className:"gap-md"},
      h("div",null,h("label",{className:"label"},"번호"),
        h("input",{type:"number",value:state.studentNumber,placeholder:"예: 1",onInput:e=>{state.studentNumber=e.target.value}})
      ),
      h("div",null,h("label",{className:"label"},"이름"),
        h("input",{type:"text",value:state.studentName,placeholder:"예: 홍길동",onInput:e=>{state.studentName=e.target.value},onKeydown:e=>{if(e.key==="Enter")startQuiz()}})
      ),
      h("button",{className:"btn btn-primary",style:{marginTop:"8px"},onClick:startQuiz},"퀴즈 시작하기 →")
    ),
    h("div",{style:{marginTop:"28px",padding:"16px",borderRadius:"12px",background:"rgba(99,102,241,0.08)",border:"1px solid rgba(99,102,241,0.15)"}},
      h("p",{style:{color:"#a5b4fc",fontSize:"13px",lineHeight:"1.6"}},"✦ 총 "+TOTAL_QUESTIONS+"문제  ✦ 3~6학년 + 심화 단어\n✦ 잘 맞추면 난이도 UP ↑  ✦ 틀리면 난이도 DOWN ↓\n✦ 틀린 단어는 모두 맞출 때까지 다시 풀기!")
    )
  );
  app.append(card);
}

function renderRetryIntro(app){
  let rw=state.retryWords;
  let tags=rw.map(w=>h("span",{style:{padding:"8px 14px",borderRadius:"10px",background:"rgba(251,191,36,0.1)",border:"1px solid rgba(251,191,36,0.25)",color:"#fbbf24",fontSize:"14px",fontWeight:600}},w.en));
  let card=h("div",{className:"card",style:{textAlign:"center"}},
    h("div",{style:{fontSize:"56px",marginBottom:"16px"}},"🔄"),
    h("h2",{style:{color:"#f1f5f9",fontSize:"24px",fontWeight:800,marginBottom:"8px"}},state.retryRound===1?"틀린 단어 다시 풀기!":state.retryRound+"라운드 도전!"),
    h("p",{className:"muted",style:{fontSize:"15px",marginBottom:"28px",lineHeight:"1.6"}},
      (state.retryRound===1?rw.length+"개의 틀린 단어를 다시 풀어보세요.":"아직 "+rw.length+"개가 남았어요. 다시 도전!")+"\n모두 맞추면 최종 결과를 볼 수 있어요."),
    h("div",{style:{display:"flex",flexWrap:"wrap",gap:"8px",justifyContent:"center",marginBottom:"28px"}},...tags),
    h("button",{className:"btn btn-orange",onClick:startRetry},state.retryRound===1?"재도전 시작! →":"다시 도전하기! →")
  );
  app.append(card);
}

function renderQuiz(app){
  let s=state,q=s.question;if(!q)return;
  let isRetry=s.screen==="retry";
  let prog=isRetry?(s.retryIndex/s.retryWords.length*100):(s.questionIndex/TOTAL_QUESTIONS*100);
  let cur=isRetry?s.retryIndex+1:s.questionIndex+1;
  let tot=isRetry?s.retryWords.length:TOTAL_QUESTIONS;
  let tl=["영어 → 뜻","뜻 → 영어","스펠링"];
  let doChk=isRetry?checkRetryAnswer:checkAnswer;
  let doNxt=isRetry?nextRetryQuestion:nextQuestion;
  let canSub=q.type<=1?!!s.selected:!!s.spellingInput.trim();

  let nextLbl;
  if(isRetry)nextLbl=s.retryIndex+1>=s.retryWords.length?"라운드 완료":"다음 →";
  else nextLbl=s.questionIndex+1>=TOTAL_QUESTIONS?"다음 단계로":"다음 문제 →";

  // Header
  let lvColor=LEVEL_COLORS[s.currentLevel];
  let badge=isRetry?
    h("span",{style:{color:"#fbbf24",fontSize:"13px",fontWeight:700,padding:"4px 10px",borderRadius:"20px",background:"rgba(251,191,36,0.1)",border:"1px solid rgba(251,191,36,0.25)"}},"🔄 재도전 "+(s.retryRound>1?"R"+s.retryRound:"")):
    h("span",{style:{color:lvColor,fontSize:"13px",fontWeight:700,padding:"4px 10px",borderRadius:"20px",background:lvColor+"15",border:"1px solid "+lvColor+"30"}},"Lv."+s.currentLevel+" "+LEVEL_LABELS[s.currentLevel]);

  let header=h("div",{style:{width:"100%",maxWidth:"500px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}},
    h("span",{className:"muted"},s.studentNumber+"번 "+s.studentName),badge);

  let progBar=h("div",{style:{width:"100%",maxWidth:"500px",height:"6px",borderRadius:"3px",background:"rgba(148,163,184,0.1)",marginBottom:"8px",overflow:"hidden"}},
    h("div",{style:{width:prog+"%",height:"100%",background:isRetry?"linear-gradient(90deg,#f59e0b,#f97316)":"linear-gradient(90deg,"+lvColor+",#818cf8)",borderRadius:"3px",transition:"width .5s"}}));

  let progText=h("div",{style:{width:"100%",maxWidth:"500px",display:"flex",justifyContent:"space-between",marginBottom:"24px"}},
    h("span",{style:{color:"#64748b",fontSize:"12px"}},cur+" / "+tot),
    h("span",{style:{color:"#64748b",fontSize:"12px"}},tl[q.type]));

  // Question card
  let prompt=h("div",{style:{textAlign:"center",marginBottom:"32px"}},
    h("p",{className:"muted",style:{marginBottom:"12px"}},q.type===0?"이 영어 단어의 뜻은?":q.type===1?"이 뜻에 맞는 영어 단어는?":"이 뜻의 영어 단어를 입력하세요"),
    h("div",{style:{fontSize:q.type===1?"28px":"36px",fontWeight:800,color:"#f1f5f9",letterSpacing:q.type!==1?"2px":"0"}},q.type===0?q.word.en:q.word.ko));

  let choices;
  if(q.type<=1){
    choices=h("div",{className:"gap-sm"},...q.options.map((opt,i)=>{
      let val=q.type===0?opt.ko:opt.en;
      let cls="option-btn";
      if(s.selected===val&&!s.showFeedback)cls+=" selected";
      if(s.showFeedback&&val===q.answer)cls+=" correct";
      if(s.showFeedback&&s.selected===val&&!s.isCorrect)cls+=" wrong";
      return h("button",{className:cls,disabled:s.showFeedback,onClick:()=>{if(!s.showFeedback){s.selected=val;render()}}},
        h("span",{style:{color:"#64748b",marginRight:"12px",fontSize:"14px"}},["A","B","C","D"][i]),val);
    }));
  }else{
    let inp=h("input",{type:"text",className:"spelling-input"+(s.showFeedback?(s.isCorrect?" correct-border":" wrong-border"):""),
      value:s.spellingInput,disabled:s.showFeedback,placeholder:"영어 단어를 입력하세요",autoComplete:"off",
      onInput:e=>{s.spellingInput=e.target.value},
      onKeydown:e=>{if(e.key==="Enter"){if(s.showFeedback)doNxt();else if(s.spellingInput.trim())doChk()}}});
    let els=[inp];
    if(s.showFeedback&&!s.isCorrect)els.push(h("p",{style:{textAlign:"center",color:"#f87171",fontSize:"15px"}},"정답: ",h("strong",{style:{color:"#fbbf24",letterSpacing:"2px"}},q.answer)));
    choices=h("div",{className:"gap-sm"},...els);
    setTimeout(()=>{if(!s.showFeedback)inp.focus()},50);
  }

  let feedback=null;
  if(s.showFeedback){
    feedback=h("div",{style:{marginTop:"20px",padding:"16px",borderRadius:"12px",background:s.isCorrect?"rgba(34,197,94,0.08)":"rgba(239,68,68,0.08)",border:"1px solid "+(s.isCorrect?"rgba(34,197,94,0.2)":"rgba(239,68,68,0.2)"),textAlign:"center"}},
      h("span",{style:{fontSize:"24px",display:"block",marginBottom:"4px"}},s.isCorrect?"🎉":"😢"),
      h("span",{style:{color:s.isCorrect?"#4ade80":"#f87171",fontWeight:700,fontSize:"16px"}},
        s.isCorrect?(isRetry?"이번엔 맞았어요!":"정답!"):(isRetry?"다음 라운드에서 다시!":"아쉬워요!")),
      ...(!s.isCorrect&&q.type<=1?[h("p",{className:"muted",style:{marginTop:"8px"}},q.word.en+" = "+q.word.ko)]:[])
    );
  }

  let actionBtn;
  if(!s.showFeedback){
    actionBtn=h("button",{className:"btn "+(isRetry?"btn-orange":"btn-primary"),disabled:!canSub,onClick:doChk},"확인");
  }else{
    actionBtn=h("button",{className:"btn "+(isRetry?"btn-orange":"btn-blue"),onClick:doNxt},nextLbl);
  }

  let card=h("div",{className:"card"},prompt,choices,feedback,h("div",{style:{marginTop:"20px"}},actionBtn));
  app.append(header,progBar,progText,card);
}

function renderResult(app){
  let s=state;
  let tc=s.results.filter(r=>r.correct).length;
  let acc=Math.round(tc/s.results.length*100);
  let ml=Math.max(...s.levelHistory);
  let gr=acc>=90?"S":acc>=75?"A":acc>=60?"B":acc>=40?"C":"D";
  let gc={S:"#fbbf24",A:"#22c55e",B:"#3b82f6",C:"#a855f7",D:"#ef4444"};
  let gm={S:"완벽해요! 최고!",A:"잘했어요! 훌륭해요!",B:"좋아요! 조금만 더!",C:"괜찮아요, 연습하면 돼요!",D:"다시 도전해봐요!"};
  let uw=s.results.filter(r=>!r.correct).map(r=>r.word).filter((w,i,a)=>a.findIndex(x=>x.en===w.en)===i);

  let els=[];

  // Submit status
  if(s.submitStatus!=="idle"){
    let sc=s.submitStatus==="success"?"rgba(34,197,94,":"rgba(99,102,241,";
    if(s.submitStatus==="error")sc="rgba(239,68,68,";
    let txt=s.submitStatus==="sending"?"📡 결과 저장 중...":s.submitStatus==="success"?"✅ 결과가 저장되었습니다":"❌ 저장 실패";
    let statusEl=h("div",{style:{padding:"10px 16px",borderRadius:"10px",marginBottom:"16px",textAlign:"center",fontSize:"13px",
      background:sc+"0.1)",border:"1px solid "+sc+"0.2)",color:s.submitStatus==="success"?"#4ade80":s.submitStatus==="error"?"#f87171":"#a5b4fc"}},txt);
    if(s.submitStatus==="error"){
      statusEl.append(h("button",{style:{marginLeft:"8px",padding:"4px 10px",borderRadius:"6px",border:"1px solid rgba(239,68,68,0.3)",background:"transparent",color:"#f87171",fontSize:"12px",cursor:"pointer"},onClick:submitToSheets},"다시 시도"));
    }
    els.push(statusEl);
  }

  // Grade
  els.push(h("div",{style:{textAlign:"center",marginBottom:"28px"}},
    h("div",{style:{width:"90px",height:"90px",borderRadius:"50%",background:gc[gr]+"20",border:"3px solid "+gc[gr],display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",boxShadow:"0 0 30px "+gc[gr]+"30"}},
      h("span",{style:{fontSize:"42px",fontWeight:900,color:gc[gr]}},gr)),
    h("h2",{style:{color:"#f1f5f9",fontSize:"22px",fontWeight:800,marginBottom:"4px"}},gm[gr]),
    h("p",{className:"muted"},s.studentNumber+"번 "+s.studentName)));

  // Stats
  let stats=[{l:"정답률",v:acc+"%",c:"#818cf8"},{l:"맞은 개수",v:tc+"/"+TOTAL_QUESTIONS,c:"#22c55e"},{l:"도달 난이도",v:"Lv."+ml,c:LEVEL_COLORS[ml]}];
  els.push(h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px",marginBottom:"24px"}},
    ...stats.map(x=>h("div",{style:{padding:"16px 12px",borderRadius:"14px",background:"rgba(15,23,42,0.5)",border:"1px solid rgba(148,163,184,0.1)",textAlign:"center"}},
      h("div",{style:{color:x.c,fontSize:"22px",fontWeight:800}},x.v),h("div",{style:{color:"#64748b",fontSize:"12px",marginTop:"4px"}},x.l)))));

  // Retry results
  if(uw.length>0){
    let tags=uw.map(w=>{
      let att=s.retryResults.filter(r=>r.word.en===w.en);
      let wc=att.filter(r=>!r.correct).length;
      return h("span",{style:{padding:"6px 12px",borderRadius:"8px",background:wc===0?"rgba(34,197,94,0.1)":"rgba(251,191,36,0.1)",color:wc===0?"#4ade80":"#fbbf24",fontSize:"13px"}},w.en+" "+(wc===0?"✓":"("+wc+"회 재시도)"));
    });
    els.push(h("div",{style:{padding:"20px",borderRadius:"14px",background:"rgba(251,191,36,0.06)",border:"1px solid rgba(251,191,36,0.15)",marginBottom:"20px"}},
      h("p",{style:{color:"#fbbf24",fontSize:"13px",fontWeight:600,marginBottom:"6px"}},"🔄 재도전 결과"),
      h("p",{className:"muted",style:{marginBottom:"12px"}},uw.length+"개 틀린 단어 → "+(s.retryRound===1?"1라운드":s.retryRound+"라운드")+" 만에 모두 정복!"),
      h("div",{style:{display:"flex",flexWrap:"wrap",gap:"6px"}},...tags)));
  }

  // Level chart
  let bars=s.levelHistory.map(lv=>h("div",{style:{flex:1,height:(lv/5*100)+"%",background:"linear-gradient(180deg,"+LEVEL_COLORS[lv]+","+LEVEL_COLORS[lv]+"60)",borderRadius:"3px 3px 0 0",minHeight:"8px"}}));
  els.push(h("div",{style:{padding:"20px",borderRadius:"14px",background:"rgba(15,23,42,0.5)",border:"1px solid rgba(148,163,184,0.1)",marginBottom:"20px"}},
    h("p",{className:"muted",style:{fontWeight:600,marginBottom:"12px"}},"난이도 변화"),
    h("div",{style:{display:"flex",alignItems:"flex-end",gap:"3px",height:"60px"}},...bars),
    h("div",{style:{display:"flex",justifyContent:"space-between",marginTop:"6px"}},h("span",{style:{color:"#475569",fontSize:"11px"}},"시작"),h("span",{style:{color:"#475569",fontSize:"11px"}},"종료"))));

  // Detail
  let rows=s.results.map(r=>h("div",{style:{display:"flex",alignItems:"center",gap:"10px",padding:"8px 12px",borderRadius:"8px",background:r.correct?"rgba(34,197,94,0.05)":"rgba(239,68,68,0.05)"}},
    h("span",{style:{fontSize:"14px"}},r.correct?"✅":"❌"),
    h("span",{style:{color:"#e2e8f0",fontSize:"14px",fontWeight:600,flex:1}},r.word.en),
    h("span",{className:"muted",style:{fontSize:"12px"}},r.word.ko),
    h("span",{style:{color:LEVEL_COLORS[r.level],fontSize:"11px",fontWeight:600,padding:"2px 6px",borderRadius:"4px",background:LEVEL_COLORS[r.level]+"15"}},"Lv."+r.level)));
  els.push(h("div",{style:{padding:"20px",borderRadius:"14px",background:"rgba(15,23,42,0.5)",border:"1px solid rgba(148,163,184,0.1)",marginBottom:"24px"}},
    h("p",{className:"muted",style:{fontWeight:600,marginBottom:"10px"}},"문제별 결과"),h("div",{className:"gap-sm"},...rows)));

  // Buttons
  els.push(h("div",{style:{display:"flex",gap:"10px"}},
    h("button",{className:"btn btn-ghost",style:{flex:1},onClick:()=>{state.screen="login";state.studentName="";state.studentNumber="";render()}},"처음으로"),
    h("button",{className:"btn btn-primary",style:{flex:1},onClick:startQuiz},"다시 도전 →")));

  let card=h("div",{className:"card"},...els);
  app.append(card);
}

// ===== INIT =====
render();
</script>
</body>
</html>
